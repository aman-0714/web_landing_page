<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teaching – Dr Madan Kumar Das</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .course-list { padding-bottom: 48px; }
    .course-year {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 28px 0 10px;
    }
    .course-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px solid #278f23;
      font-size: 14px;
    }
    .course-row:last-child { border-bottom: none; }
    .course-name { color: var(--text); }
    .course-meta { color: #999; font-size: 13px; white-space: nowrap; }
    .course-tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--green-light);
      color: var(--green);
      font-weight: 500;
      margin-left: 8px;
    }
    .site-footer { color: var(--green); }
    .site-footer a { color: var(--green); }
  </style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="hdr-name">Dr Madan Kumar Das</div>
    <div class="hdr-sub">
      Assistant Professor, Dept. of Electrical Engineering,<br>
      Dr B R Ambedkar National Institute of Technology, Jalandhar
    </div>
  </div>
  <div class="hdr-divider"></div>
  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="research.html">Research</a>
    <a href="teaching.html" class="active">Teaching</a>
    <a href="cv.html">CV</a>
  </nav>
</header>

<div class="page-wrap">
  <div class="page-bar">Teaching</div>

  <div class="course-list">
    <div class="course-year">Current Semester</div>
    <div id="current_courses_area"></div>

    <div class="course-year">Previous Courses</div>
    <div id="previous_courses_area"></div>
  </div>
</div>

<footer class="site-footer"><a href="admin-login.html">⚙ Admin</a></footer>

<script>
// Default courses shown when admin hasn't saved anything yet
var DEFAULT_CURRENT = [
  { name: "Database Management System", meta: "CS301" }
];
var DEFAULT_PREV = [];

function renderCourseRows(list) {
  if (!list || list.length === 0) return '<p style="color:#777;font-style:italic">No courses listed.</p>';
  return list.map(function(c) {
    return '<div class="course-row">'
      + '<span class="course-name">' + escHtml(c.name || '') + '</span>'
      + (c.meta ? '<span class="course-meta">' + escHtml(c.meta) + '</span>' : '')
      + '</div>';
  }).join('');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Load from admin_courses_* (set by admin dashboard)
var rawCurrent = localStorage.getItem('admin_courses_current');
var rawPrev    = localStorage.getItem('admin_courses_prev');

// Also fall back to legacy teaching_current_html / teaching_prev_html if present
var legacyCurrent = localStorage.getItem('teaching_current_html');
var legacyPrev    = localStorage.getItem('teaching_prev_html');

var currentArea = document.getElementById('current_courses_area');
var prevArea    = document.getElementById('previous_courses_area');

if (rawCurrent) {
  try {
    currentArea.innerHTML = renderCourseRows(JSON.parse(rawCurrent));
  } catch(e) {
    currentArea.innerHTML = legacyCurrent || renderCourseRows(DEFAULT_CURRENT);
  }
} else if (legacyCurrent) {
  currentArea.innerHTML = legacyCurrent;
} else {
  currentArea.innerHTML = renderCourseRows(DEFAULT_CURRENT);
}

if (rawPrev) {
  try {
    prevArea.innerHTML = renderCourseRows(JSON.parse(rawPrev));
  } catch(e) {
    prevArea.innerHTML = legacyPrev || renderCourseRows(DEFAULT_PREV);
  }
} else if (legacyPrev) {
  prevArea.innerHTML = legacyPrev;
} else {
  prevArea.innerHTML = renderCourseRows(DEFAULT_PREV);
}
</script>
</body>
</html>
