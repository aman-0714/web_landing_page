<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Dr Madan Kumar Das</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #f0f3eb;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff; border: 1px solid #ddd;
      border-top: 5px solid #1a4fa0; border-radius: 6px;
      padding: 44px 52px; width: 400px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    }
    .card h1 { color: #1a4fa0; font-size: 24px; font-weight: bold; }
    .card .sub { color: #888; font-size: 13px; margin: 4px 0 32px; font-family: Arial, sans-serif; }
    label { display: block; font-size: 12px; color: #555; font-weight: bold;
            letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px;
            font-family: Arial, sans-serif; }
    input[type=text], input[type=password] {
      width: 100%; padding: 10px 14px; border: 1px solid #ccc;
      border-radius: 4px; font-size: 14px; margin-bottom: 20px;
      font-family: Arial, sans-serif; transition: border-color .2s;
    }
    input:focus { outline: none; border-color: #1a4fa0; }
    button {
      width: 100%; padding: 12px; background: #1a4fa0; color: #fff;
      border: none; border-radius: 4px; font-size: 15px; cursor: pointer;
      font-weight: bold; font-family: Arial, sans-serif; transition: background .2s;
    }
    button:hover { background: #133d80; }
    button:disabled { background: #93b4e0; cursor: not-allowed; }
    .error { color: #c0392b; font-size: 13px; margin-top: 14px;
             font-family: Arial, sans-serif; display: none; }
    .back { display: block; text-align: center; margin-top: 20px;
            font-size: 13px; color: #22a334; text-decoration: none;
            font-family: Arial, sans-serif; }
    .back:hover { color: #1a4fa0; }
  </style>
</head>
<body>
<div class="card">
  <h1>Admin Panel</h1>
  <p class="sub">Dr Madan Kumar Das · NIT Jalandhar</p>

  <label>Username</label>
  <input type="text" id="u" placeholder="Enter username" autocomplete="username">

  <label>Password</label>
  <input type="password" id="p" placeholder="Enter password" autocomplete="current-password">

  <button id="login_btn" onclick="login()">Login →</button>
  <p class="error" id="err">Invalid username or password. Please try again.</p>
  <a href="index.html" class="back">← Back to main site</a>
</div>
<script>
  // Uses the backend API for authentication — credentials are stored in .env on the server
  // NOT hardcoded in the browser anymore!
  async function login() {
    const u   = document.getElementById("u").value.trim();
    const p   = document.getElementById("p").value;
    const btn = document.getElementById("login_btn");
    const err = document.getElementById("err");
    err.style.display = "none";

    if (!u || !p) { err.textContent = "Please enter username and password."; err.style.display = "block"; return; }

    btn.disabled    = true;
    btn.textContent = "Logging in...";

    try {
      const res = await fetch("/api/login", {
        method  : "POST",
        headers : { "Content-Type": "application/json" },
        body    : JSON.stringify({ username: u, password: p }),
      });
      const data = await res.json();

      if (data.ok && data.token) {
        sessionStorage.setItem("adminLoggedIn", "true");
        sessionStorage.setItem("adminToken", data.token); // saved for API calls
        window.location.href = "admin-dashboard.html";
      } else {
        err.textContent = "Invalid username or password.";
        err.style.display = "block";
      }
    } catch (e) {
      err.textContent = "Cannot connect to server. Is it running?";
      err.style.display = "block";
    } finally {
      btn.disabled    = false;
      btn.textContent = "Login →";
    }
  }

  document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
</script>
</body>
</html>
