<!-- Admin link -->

</div>

<script>
// Apply profile header
const name = localStorage.getItem("admin_prof_name");
const title = localStorage.getItem("admin_prof_title");
const dept  = localStorage.getItem("admin_prof_dept");
const inst  = localStorage.getItem("admin_prof_institute");
if (name) document.getElementById("hdr_name").textContent = name;
if (title || dept || inst) {
  document.getElementById("hdr_sub").innerHTML =
    (title||"Professor") + ", " + (dept||"Dept. of Electrical Engineering") + ",<br>" +
    (inst||"Indian Institute of Technology Bombay");
}

// Research cards
const DEFAULT_RESEARCH = [
  { img: "img1.jpg", desc: "Dynamic Rds-on measurement circuit: 1) start assessing from the 1st cycle, 2) independent control on testing parameters, 3) HS, SS, and RS operation, 4) regenerative operation." },
  { img: "img2.jpg", desc: "Zero voltage switched, regenerative snubber based isolated dc-dc converter using GaN switches. Application – Mobile charger, USB-PD, multi-output dc-dc converter etc." },
  { img: "img3.jpg", desc: "GaN based independently controlled multi output flyback (ICMOFC) with high efficiency and excellent cross-regulation performance." },
  { img: "img4.jpg", desc: "Additional research content." },
  { img: "img5.jpg", desc: "Additional research content." },
  { img: "img6.jpg", desc: "Additional research content." }
];

const raw = localStorage.getItem("admin_research");
const cards = raw ? JSON.parse(raw) : DEFAULT_RESEARCH;

const grid = document.getElementById("research_grid");
grid.innerHTML = "";
cards.forEach(card => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML =
    '<img src="' + card.img + '" onclick="window.open(this.src)" style="cursor:zoom-in" title="Click to view full size">' +
    '<p>' + card.desc + '</p>';
  grid.appendChild(div);
});
</script>

</body>
</html>
